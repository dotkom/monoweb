# The main integration pipeline
#
# It is responsible for verifying linting, type checking, testing, and building packages in the entire monorepo.

name: CI & CD
on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

permissions:
  id-token: write
  contents: read

jobs:
  verify-quality-checks:
    name: Lint, type check, and unit tests
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.28.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.21.1
          cache: pnpm
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            packages/db/tsconfig.tsbuildinfo
            packages/grades-db/tsconfig.tsbuildinfo
          key: tsbuildinfo-${{ hashFiles('packages/db/src/**', 'packages/db/generated/**', 'packages/grades-db/src/**', 'packages/grades-db/generated/**') }}
          restore-keys: tsbuildinfo-
      - run: pnpm install --frozen-lockfile
        name: Install dependencies from pnpm lockfile
      - run: pnpm lint-check
        name: Linting and formatting checks
      - run: pnpm type-check
        name: TypeScript type checker
      - run: pnpm test
        name: Unit tests

  test-integration:
    name: Integration tests
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.28.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.21.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        name: Install dependencies from pnpm lockfile
      - run: pnpm test:it
        name: Run RPC integration tests

  verify-monoweb-prisma-generate:
    name: Verify Monoweb Prisma generate
    runs-on: ubuntu-24.04-arm
    services:
      postgres:
        image: postgres:16-alpine@sha256:b7587f3cb74f4f4b2a4f9d67f052edbf95eb93f4fec7c5ada3792546caaf7383
        env:
          POSTGRES_USER: ow
          POSTGRES_PASSWORD: owpassword123
          POSTGRES_DB: ow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ow -d ow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/internal/prisma-generate-verify
        with:
          package: monoweb

  verify-grades-prisma-generate:
    name: Verify Grades Prisma generate
    runs-on: ubuntu-24.04-arm
    services:
      postgres:
        image: postgres:16-alpine@sha256:b7587f3cb74f4f4b2a4f9d67f052edbf95eb93f4fec7c5ada3792546caaf7383
        env:
          POSTGRES_USER: grades
          POSTGRES_PASSWORD: gradespassword123
          POSTGRES_DB: grades
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U grades -d grades"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/internal/prisma-generate-verify
        with:
          package: grades

  build-dashboard:
    name: dashboard
    runs-on: ubuntu-24.04-arm
    needs:
      - verify-quality-checks
      - test-integration
      - verify-monoweb-prisma-generate
    steps:
      - name: Install local GitHub Actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          sparse-checkout: '.github'
          sparse-checkout-cone-mode: true
      - uses: ./.github/actions/build-dashboard
        with:
          deploy: false
          environment: prd
          git-hash: ${{ github.sha }}

  build-rpc:
    name: rpc
    runs-on: ubuntu-24.04-arm
    needs:
      - verify-quality-checks
      - test-integration
      - verify-monoweb-prisma-generate
    steps:
      - name: Install local GitHub Actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          sparse-checkout: '.github'
          sparse-checkout-cone-mode: true
      - uses: ./.github/actions/build-rpc
        with:
          deploy: false
          environment: prd
          git-hash: ${{ github.sha }}

  build-web:
    name: web
    runs-on: ubuntu-24.04-arm
    needs:
      - verify-quality-checks
      - test-integration
      - verify-monoweb-prisma-generate
    steps:
      - name: Install local GitHub Actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          sparse-checkout: '.github'
          sparse-checkout-cone-mode: true
      - uses: ./.github/actions/build-web
        with:
          deploy: false
          environment: prd
          git-hash: ${{ github.sha }}

  build-grades-backend:
    name: grades-backend
    runs-on: ubuntu-24.04-arm
    needs:
      - verify-quality-checks
      - test-integration
      - verify-grades-prisma-generate
    steps:
      - name: Install local GitHub Actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          sparse-checkout: '.github'
          sparse-checkout-cone-mode: true
      - uses: ./.github/actions/build-grades-backend
        with:
          deploy: false
          environment: prd
          git-hash: ${{ github.sha }}

  build-grades-frontend:
    name: grades-frontend
    runs-on: ubuntu-24.04-arm
    needs:
      - verify-quality-checks
      - test-integration
      - verify-grades-prisma-generate
    steps:
      - name: Install local GitHub Actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          sparse-checkout: '.github'
          sparse-checkout-cone-mode: true
      - uses: ./.github/actions/build-grades-frontend
        with:
          deploy: false
          environment: prd
          git-hash: ${{ github.sha }}
